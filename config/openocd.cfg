# config/openocd.cfg — OpenOCD 调试探针配置模板
# 根据你的探针类型和目标芯片修改

# ── 探针接口 ──────────────────────────────────────────────
# ST-Link v2（最常见）
source [find interface/stlink.cfg]
transport select hla_swd

# J-Link（取消注释以启用）
# source [find interface/jlink.cfg]
# transport select swd

# CMSIS-DAP（取消注释以启用）
# source [find interface/cmsis-dap.cfg]
# transport select swd

# ── 目标芯片 ──────────────────────────────────────────────
# STM32F1 系列 (STM32F103C8T6)
source [find target/stm32f1x.cfg]

# STM32F4 系列（取消注释以替换）
# source [find target/stm32f4x.cfg]

# STM32H7 系列（取消注释以替换）
# source [find target/stm32h7x.cfg]

# GD32F3 系列（取消注释以替换）
# source [find target/gd32f3x.cfg]

# ── SWD 速度 ───────────────────────────────────────────────
adapter speed 4000

# ── GDB 服务器 ────────────────────────────────────────────
# Claude Code debugger-agent 通过此端口读取寄存器和内存
gdb_port 3333
telnet_port 4444
tcl_port 6666

# ── 复位配置 ──────────────────────────────────────────────
reset_config srst_only
